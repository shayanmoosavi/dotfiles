# Hyprlock

# Modified version of JaKooLit dotfiles
# https://github.com/JaKooLit

# Sourcing colors generated by matugen
source = $HOME/.config/hypr/colors/colors-matugen.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    ignore_empty_input = true
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = $HOME/.config/hypr/current_wallpaper

    color = rgb(0,0,0) # color will be rendered initially until path is available

    blur_size = 6
    blur_passes = 3
    noise = 0.1
    contrast = 1.5
    brightness = 1
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = $primary_fixed_dim
    font_size = 16
    font_family = DepartureMono Bold Italic
    position = 0, -120
    halign = center
    valign = center
}

# Hour-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I")" #AM/PM
    color = $primary_container
    font_size = 200
    font_family = DepartureMono Nerd Font ExtraBold
    position = 0, -60
    halign = center
    valign = top
}

# Minute-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = $tertiary_container
    font_size = 200
    font_family = DepartureMono Nerd Font ExtraBold
    position = 0, -340
    halign = center
    valign = top
}

# Seconds-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%S %p")" #AM/PM
    color = $secondary
    font_size = 35
    font_family = DepartureMono Nerd Font ExtraBold
    position = 0, -350
    halign = center
    valign = top
}

# USER
label {
    monitor =
    text =   $USER
    color = $tertiary_fixed
    font_size = 24
    font_family = DepartureMono Bold
    position = 0, 220
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 200, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $outline_variant
    inner_color = rgba(255, 255, 255, 0.1)
	capslock_color = rgb(255,255,255)
    font_color = $on_primary
    fade_on_empty = false
    font_family = DepartureMono Bold
    placeholder_text = <i><span foreground="##ffffff99">Password</span></i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}

# Keyboard LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = $tertiary_fixed
    font_size = 10
    font_family = DepartureMono Bold
    position = 0, 70
    halign = center
    valign = bottom
}

# uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p)" </b>"
    color = $tertiary_fixed
    font_size = 16
    font_family = DepartureMono Bold
    position = 0, 0
    halign = right
    valign = bottom
}

# battery information
label {
    monitor =
    text = cmd[update:1000] echo "<b> "$($Scripts/Battery.sh)" </b>"
    color = $tertiary_fixed
    font_size = 16
    font_family = DepartureMono Bold
    position = 0, 30
    halign = right
    valign = bottom
}
