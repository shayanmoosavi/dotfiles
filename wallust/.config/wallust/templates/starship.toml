# Colors for starship, generated by Wallust
# -----------------------------------------------------------------
# Wallust information:
# * colorspace: {{colorspace}}
# * palette: {{palette}}
# -----------------------------------------------------------------

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$directory\
$git_branch\
$fill\
$conda\
$python\
$all\
$time\
$line_break\
$shell\
$character
"""

palette = 'wallust'

[palettes.wallust]
color0 = '{{color0}}'
color1 = '{{color1}}'
color2 = '{{color2}}'
color3 = '{{color3}}'
color4 = '{{color4}}'
color5 = '{{color5}}'
color6 = '{{color6}}'
color7 = '{{color7}}'
color8 = '{{color8}}'
color9 = '{{color9}}'
color10 = '{{color10}}'
color11 = '{{color11}}'
color12 = '{{color12}}'
color13 = '{{color13}}'
color14 = '{{color14}}'
color15 = '{{color15}}'

[os]
disabled = false
style = "bold color10"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Garuda = ""
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bold color13"
style_root = "bold color14"
format = '[ $user ]($style)'

[shell]
fish_indicator = '󰈺 '
bash_indicator = ''
zsh_indicator = '󰬇'
unknown_indicator = ''
style = 'bold color2'
format = '[\(at $indicator\) ]($style)'
disabled = false

[directory]
style = "color6"
format = "[  $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bold color11"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold color3"
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
format = '[($all_status$ahead_behind )]($style)'

[conda]
symbol = "󱔎"
style = "bold #00D115"
format = '[[ $symbol \($environment\) ](fg:#00D115 bg:transparent)]($style)'
ignore_base = false

[python]
symbol = ""
style = "bold #FFF200"
format = '[ $symbol( $version) ]($style)'

[perl]
symbol = ""
style = "bg:#1A0091 fg:#F5F5F5"
format = '[ $symbol ]($style)'

[lua]
symbol = "󰢱"
style = "bold #091CED"
format = '[ $symbol ]($style)'

[time]
disabled = false
time_format = "%r"
style = "color15"
format = '[  $time ]($style)'

[cmd_duration]
min_time = 100
show_milliseconds = true
style = 'bold color2'
format = '[took $duration]($style) '

[character]
disabled = false
success_symbol = '[](bold fg:color7)'
error_symbol = '[](bold fg:#FF2A17)'
